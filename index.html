<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>마음 튼튼 새싹 학교</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ["Noto Sans KR", "sans-serif"], jua: ["Jua", "sans-serif"] } } } }</script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent }
    html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden }
    body { font-family: "Noto Sans KR", sans-serif; background: #f0fdf4; touch-action: manipulation }
    .font-jua { font-family: "Jua", sans-serif }
    @keyframes zoomIn { from { opacity: 0; transform: scale(.7) } to { opacity: 1; transform: scale(1) } }
    .anim-zoom { animation: zoomIn .35s cubic-bezier(.175, .885, .32, 1.275) both }
    @keyframes floatY { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-12px) } }
    .anim-float { animation: floatY 2.5s ease-in-out infinite }
    @keyframes hb { 0%,100% { transform: scale(1) } 30% { transform: scale(1.45) } 60% { transform: scale(1) } }
    .anim-hb { animation: hb 1.4s ease-in-out infinite }
    @keyframes pulse2 { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
    .anim-pulse { animation: pulse2 1.5s ease-in-out infinite }
    @keyframes bounceBtn { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-7px) } }
    .anim-bounce { animation: bounceBtn 1s ease-in-out infinite }
    @keyframes spin360 { from { transform: rotate(0) } to { transform: rotate(360deg) } }
    .anim-spin { animation: spin360 .6s ease-in-out }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    .anim-fade { animation: fadeIn .4s ease both }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .anim-shake { animation: shake .4s ease-in-out }
    @keyframes starPop { 0%{transform:scale(0) rotate(-180deg);opacity:0} 60%{transform:scale(1.3) rotate(10deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
    .anim-star { animation: starPop .5s cubic-bezier(.175,.885,.32,1.275) both }
    .sidebar-scroll::-webkit-scrollbar { width: 6px }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 6px }
    /* 반응형: 작은 화면에서 사이드바 숨기고 햄버거 메뉴 */
    @media (max-width: 768px) {
      .mobile-hide { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const isGAS = typeof google !== "undefined" && typeof google.script !== "undefined";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyvAgyKarco76Zwn8OjYU_oewaYhh0jTg-pWNnffQ4tMOy4UQvOIoGYAPpjhl-qZ1ctDA/exec";
    
    const callGAS = async (action, payload = {}) => {
      if (!GAS_URL.startsWith("http")) return null;
      try {
        const r = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action, ...payload })
        });
        const j = await r.json();
        return j.success ? j.data : null;
      } catch (e) { console.error("fetch error:", e); return null; }
    };

    // ===== 효과음 (Web Audio API) =====
    let audioCtx = null;
    const initAudio = () => { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} } return audioCtx; };
    const playTone = (freq, dur, type = 'sine', vol = 0.3) => {
      const ctx = initAudio(); if (!ctx) return;
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + dur);
    };
    const sfxCorrect = () => { 
      playTone(523, 0.15, 'sine', 0.2);
      setTimeout(() => playTone(659, 0.15, 'sine', 0.2), 100);
      setTimeout(() => playTone(784, 0.3, 'sine', 0.25), 200);
    };
    const sfxWrong = () => { 
      playTone(300, 0.2, 'sawtooth', 0.15);
      setTimeout(() => playTone(200, 0.3, 'sawtooth', 0.15), 150);
    };
    const sfxClick = () => playTone(800, 0.05, 'sine', 0.1);
    const sfxStar = () => { 
      playTone(880, 0.1, 'sine', 0.2);
      setTimeout(() => playTone(1047, 0.15, 'sine', 0.2), 80);
    };

    // ===== 음성 합성 (Google Wavenet/Neural 우선) =====
    window.__TTS__ = false;
    let __ttsT = null;
    let __cachedVoice = null;
    
    const findBestKoreanVoice = () => {
      if (!window.speechSynthesis) return null;
      if (__cachedVoice) return __cachedVoice;
      const voices = window.speechSynthesis.getVoices();
      if (voices.length === 0) return null;
      // 1순위: Google 한국어 (클라우드)
      let v = voices.find(v => v.lang === 'ko-KR' && v.name.toLowerCase().includes('google') && !v.localService);
      // 2순위: Wavenet/Neural2
      if (!v) v = voices.find(v => v.lang === 'ko-KR' && /wavenet|neural/i.test(v.name));
      // 3순위: 자연스러움 키워드
      if (!v) v = voices.find(v => v.lang === 'ko-KR' && /premium|enhanced|natural/i.test(v.name));
      // 4순위: Google 한국어 (로컬)
      if (!v) v = voices.find(v => v.lang === 'ko-KR' && v.name.toLowerCase().includes('google'));
      // 5순위: 그냥 한국어
      if (!v) v = voices.find(v => v.lang === 'ko-KR');
      __cachedVoice = v;
      return v;
    };

    const speak = (txt, rate = 0.95, pitch = 1.0) => {
      if (!window.speechSynthesis || !window.__TTS__ || !txt) return;
      const synth = window.speechSynthesis;
      synth.cancel();
      clearTimeout(__ttsT);
      __ttsT = setTimeout(() => {
        const u = new SpeechSynthesisUtterance(txt);
        const setV = () => {
          const v = findBestKoreanVoice();
          if (v) u.voice = v;
        };
        if (synth.getVoices().length === 0) {
          synth.addEventListener("voiceschanged", () => { setV(); synth.speak(u); }, { once: true });
          return;
        }
        setV();
        u.rate = rate;
        u.pitch = pitch;
        u.volume = 1.0;
        synth.speak(u);
      }, 80);
    };
    const stopSpeak = () => { clearTimeout(__ttsT); window.speechSynthesis && window.speechSynthesis.cancel(); };

    // ===== 음성 인식 (STT) =====
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    const DEF_QUIZ = {
      set1: { title: "상황 속 마음 퀴즈", qs: [
        { q: "친구가 넘어져 무릎에서 피가 나고 있어. 어떤 마음이 들까?", o1: "별로 상관없어. 그냥 지나쳐 가요 😶", o2: "친구가 많이 아프겠다. 걱정되는 마음이에요 😢", a: 2, fb: "다친 친구를 걱정해주는 네 마음이 정말 따뜻해!" },
        { q: "선생님이 어려운 질문을 하셨는데 정답을 모르겠어.", o1: "모를 때는 그냥 조용히 있어요 😶", o2: "손을 들고 다시 설명해 주세요 라고 말해요 🙋", a: 2, fb: "모르는 건 부끄러운 게 아니야! 씩씩하게 말해줘서 멋져!" }
      ]},
      set2: { title: "예쁜 말 퀴즈", qs: [
        { q: "친구가 내 장난감을 빌려달라고 해.", o1: "지금은 내가 놀고 있어. 조금만 기다려 줄 수 있어? 😊", o2: "싫다고 소리를 지르며 가버려요 😠", a: 1, fb: "부드럽게 말하면 친구도 잘 기다려줄 거야!" },
        { q: "수업 중에 복도에서 뛰고 싶은 마음이 들어.", o1: "신나서 빠르게 뛰어갑니다 🏃", o2: "꾹 참고 사뿐사뿐 고양이처럼 걸어가요 🐈", a: 2, fb: "모두의 안전을 위해 규칙을 지키는 네가 최고야!" }
      ]}
    };

    // ===== 미션 구조 (9개) =====
    const MISSIONS = [
      { id: 1, chap: 1, chapName: "1장. 감정 알기", chapColor: "green", type: "startVoice", title: "오늘의 감정", icon: "🎙️", feedUp: "오늘 내 기분이 어떤지 솔직하게 말해볼까요?", feedFwd: "솔직하게 말해줘서 고마워! 이제 마음 공부를 시작해보자!" },
      { id: 2, chap: 1, chapName: "1장. 감정 알기", chapColor: "green", type: "weather", title: "마음 날씨", icon: "☀️", feedUp: "지금 내 마음속 날씨는 어떤지 골라보자!", feedFwd: "솔직하게 내 마음을 마주하는 것이 가장 중요해!" },
      { id: 3, chap: 1, chapName: "1장. 감정 알기", chapColor: "green", type: "quiz", set: "set1", title: "내 감정 찾기", icon: "🤔", feedUp: "이럴 때는 어떤 마음을 가져야 올바를까?", feedFwd: "상황에 맞는 마음을 잘 찾았어! 정말 훌륭해!" },
      { id: 4, chap: 2, chapName: "2장. 감정 표현하기", chapColor: "orange", type: "quiz", set: "set2", title: "예쁜 말 퀴즈", icon: "💬", feedUp: "친구와 사이좋게 지내려면 어떻게 표현해야 할까?", feedFwd: "예쁜 말은 친구의 마음을 따뜻하게 만들어!" },
      { id: 5, chap: 2, chapName: "2장. 감정 표현하기", chapColor: "orange", type: "bandage", title: "마음 반창고", icon: "🩹", feedUp: "친구가 속상해해요. 마음 반창고를 붙여줄래요?", feedFwd: "따뜻하게 감싸주니까 친구가 정말 기뻐해!" },
      { id: 6, chap: 3, chapName: "3장. 감정 조절하기", chapColor: "blue", type: "breath", title: "풍선 호흡", icon: "🎈", feedUp: "화가 나면 풍선을 7번 크게 불어보자!", feedFwd: "후~ 마음이 편안해졌지? 화가 날 땐 심호흡을 해봐!" },
      { id: 7, chap: 3, chapName: "3장. 감정 조절하기", chapColor: "blue", type: "scrub", title: "마음 지우개", icon: "🧽", feedUp: "나쁜 감정을 손가락으로 쓱쓱 지워보자!", feedFwd: "화난 기분이 싹 지워졌어! 마음이 한결 가볍지?" },
      { id: 8, chap: 4, chapName: "4장. 배움 나누기", chapColor: "purple", type: "teach", title: "친구에게 설명하기", icon: "🗣️", feedUp: "지금까지 배운 것을 친구에게 가르쳐줄까요? 화가 날 때 어떻게 하는지 말해봐요!", feedFwd: "다른 사람에게 설명하면 더 잘 기억된대! 정말 멋져!" },
      { id: 9, chap: 4, chapName: "4장. 배움 나누기", chapColor: "purple", type: "record", title: "나의 다짐", icon: "🎤", feedUp: "마음이 튼튼해지기 위해 무엇을 할지 약속해봐요!", feedFwd: "멋진 다짐이야! 앞으로도 꼭 실천해 보자!" }
    ];

    const CS = {
      green: { hdr: "from-green-500 to-emerald-600", active: "border-green-400 bg-white shadow-green-200 shadow-md", ring: "ring-green-300" },
      blue: { hdr: "from-blue-500 to-sky-600", active: "border-blue-400 bg-white shadow-blue-200 shadow-md", ring: "ring-blue-300" },
      orange: { hdr: "from-orange-500 to-amber-600", active: "border-orange-400 bg-white shadow-orange-200 shadow-md", ring: "ring-orange-300" },
      purple: { hdr: "from-purple-500 to-violet-600", active: "border-purple-400 bg-white shadow-purple-200 shadow-md", ring: "ring-purple-300" }
    };
    const CC = ["green", "orange", "blue", "purple"];

    const WEATHER = [
      { id: "sunny", icon: "☀️", label: "맑음", bg: "bg-amber-400", desc: "기분이 하늘을 날 것 같아요!", tip: "오늘의 행복을 친구에게도 나눠주세요." },
      { id: "cloudy", icon: "⛅", label: "흐림", bg: "bg-slate-400", desc: "좋지도 나쁘지도 않은 기분이에요.", tip: "재미있는 그림책을 읽어보는 건 어때요?" },
      { id: "rainy", icon: "🌧️", label: "비", bg: "bg-blue-500", desc: "조금 슬프고 눈물이 날 것 같아요.", tip: "선생님이나 부모님께 속마음을 이야기해 보세요." },
      { id: "storm", icon: "⚡", label: "번개", bg: "bg-red-500", desc: "마음속에서 쾅쾅! 화가 났어요.", tip: "눈을 감고 후~ 풍선 호흡을 해보세요." }
    ];

    // ===== 아이콘 =====
    const IVol = ({ s = 24, c = "" }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={c}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></svg>;
    const IMute = ({ s = 24, c = "" }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={c}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><line x1="23" y1="9" x2="17" y2="15" /><line x1="17" y1="9" x2="23" y2="15" /></svg>;
    const IBack = ({ s = 24 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>;
    const ICheck = ({ s = 24 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><polyline points="9 12 12 15 16 9" /></svg>;
    const IHeart = ({ s = 24, fill = "none", c = "" }) => <svg width={s} height={s} viewBox="0 0 24 24" fill={fill} stroke={fill === "none" ? "currentColor" : fill} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" /></svg>;
    const IMenu = ({ s = 24 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></svg>;
    const IStar = ({ s = 24, fill = "#fbbf24", c = "" }) => <svg width={s} height={s} viewBox="0 0 24 24" fill={fill} stroke={fill} strokeWidth="1" className={c}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg>;

    const Loading = () => (
      <div className="w-full h-full flex items-center justify-center bg-gradient-to-b from-yellow-300 to-green-400">
        <div className="bg-white p-10 rounded-[3rem] shadow-2xl flex flex-col items-center gap-4">
          <div className="text-[5rem] anim-float">🌱</div>
          <p className="text-3xl font-black text-slate-600 font-jua anim-pulse">불러오는 중...</p>
        </div>
      </div>
    );

    // ===== 시작 화면 (단순화) =====
    const NameSelect = ({ names, onSelect }) => {
      const [selName, setSelName] = useState("");
      return (
        <div className="w-full h-full bg-gradient-to-b from-yellow-300 to-green-400 flex items-center justify-center p-4 overflow-y-auto">
          <div className="bg-white rounded-[2.5rem] sm:rounded-[3rem] shadow-2xl border-[6px] sm:border-[8px] border-yellow-200 w-full max-w-2xl p-6 sm:p-8 lg:p-10 flex flex-col items-center gap-4 sm:gap-6 anim-zoom my-auto">
            <div className="text-[4rem] sm:text-[5rem] lg:text-[6rem] anim-float leading-none shrink-0 mt-1">🌱</div>
            <h1 className="text-3xl sm:text-4xl lg:text-5xl font-black text-slate-800 font-jua text-center leading-tight shrink-0">
              마음 튼튼<br /><span className="text-green-500">새싹 학교</span>
            </h1>
            <p className="text-base sm:text-lg text-slate-500 font-bold text-center break-keep -mt-2">
              감정을 알고, 표현하고, 다스리는 9가지 미션 🎯
            </p>
            <div className="w-full anim-zoom mt-2 shrink-0">
              <p className="text-lg sm:text-xl lg:text-2xl font-black text-slate-700 text-center mb-3 sm:mb-4 font-jua">내 이름을 고르고 시작해요! 👇</p>
              <div className="flex gap-2 sm:gap-3 lg:gap-4">
                <select value={selName} onChange={e => setSelName(e.target.value)} className="flex-1 p-3 sm:p-4 lg:p-5 bg-white border-[3px] sm:border-[4px] border-slate-200 rounded-[1.2rem] sm:rounded-[1.5rem] text-xl sm:text-2xl lg:text-3xl font-black text-center font-jua text-slate-700 focus:outline-none focus:border-green-400 min-w-0">
                  <option value="" disabled>이름 선택</option>
                  {names.map(n => (<option key={n} value={n}>{n}</option>))}
                </select>
                <button onClick={() => { 
                  if (!selName) { alert("이름을 골라주세요!"); return; } 
                  sfxClick();
                  onSelect(selName); 
                }} className="px-4 sm:px-6 lg:px-8 py-3 sm:py-4 lg:py-5 bg-green-500 text-white rounded-[1.2rem] sm:rounded-[1.5rem] text-xl sm:text-2xl lg:text-3xl font-black font-jua shadow-[0_5px_0_#15803d] sm:shadow-[0_6px_0_#15803d] active:translate-y-1 active:shadow-none whitespace-nowrap shrink-0">
                  시작! 🚀
                </button>
              </div>
              <p className="text-xs sm:text-sm text-slate-400 text-center mt-3 break-keep">
                💡 화면 위 🔇 아이콘을 누르면 소리를 켤 수 있어요
              </p>
            </div>
          </div>
        </div>
      );
    };

    // ===== 사이드바 =====
    const Sidebar = ({ hearts, mId, records, onSelect, onClose, totalMissions }) => (
      <div className="h-full flex flex-col bg-slate-50/50 border-r-2 border-slate-100 shadow-2xl relative z-30 w-72 lg:w-[22rem] shrink-0">
        <div className="bg-gradient-to-b from-green-500 to-emerald-600 px-4 py-3 lg:px-5 lg:py-4 shrink-0 flex justify-between items-center shadow-md">
          <h1 className="text-2xl lg:text-3xl font-black text-white font-jua break-keep tracking-tight">🌱 마음튼튼</h1>
          {onClose && <button onClick={onClose} className="md:hidden text-white text-2xl px-2">✕</button>}
        </div>
        <div className="flex-1 overflow-y-auto sidebar-scroll p-3 lg:p-4 pb-6 flex flex-col gap-2 lg:gap-3">
          {[1, 2, 3, 4].map(n => {
            const ms = MISSIONS.filter(m => m.chap === n);
            if (ms.length === 0) return null;
            const cs = CS[CC[n - 1]];
            return (
              <div key={n} className="flex flex-col shrink-0">

    // ===== 음성 녹음 + STT 컴포넌트 (재사용) =====
    const useVoiceRecorder = (name, fileLabel) => {
      const [state, setState] = useState("idle"); // idle, recording, done
      const [audioUrl, setAudioUrl] = useState("");
      const [transcript, setTranscript] = useState("");
      const [interimText, setInterimText] = useState("");
      const mediaRecorder = useRef(null);
      const chunks = useRef([]);
      const recognition = useRef(null);
      const finalTranscriptRef = useRef("");

      const startRec = async () => {
        finalTranscriptRef.current = "";
        setTranscript("");
        setInterimText("");
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder.current = new MediaRecorder(stream);
          chunks.current = [];
          mediaRecorder.current.ondataavailable = e => { if (e.data.size > 0) chunks.current.push(e.data); };
          mediaRecorder.current.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(chunks.current, { type: "audio/webm" });
            const currentUrl = URL.createObjectURL(blob);
            setAudioUrl(currentUrl);
            const r = new FileReader();
            r.readAsDataURL(blob);
            r.onloadend = () => {
              const fn = `마음튼튼_${fileLabel}_${name || "어린이"}_${Date.now()}.webm`;
              if (isGAS) {
                google.script.run.uploadAudio(r.result, fn);
              } else {
                callGAS("uploadAudio", { dataUrl: r.result, filename: fn });
              }
            };
          };
          mediaRecorder.current.start();
          
          // STT 시작
          if (SpeechRecognition) {
            try {
              recognition.current = new SpeechRecognition();
              recognition.current.lang = 'ko-KR';
              recognition.current.continuous = true;
              recognition.current.interimResults = true;
              recognition.current.onresult = (event) => {
                let interim = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                  const text = event.results[i][0].transcript;
                  if (event.results[i].isFinal) {
                    finalTranscriptRef.current += text + " ";
                  } else {
                    interim += text;
                  }
                }
                setTranscript(finalTranscriptRef.current);
                setInterimText(interim);
              };
              recognition.current.onerror = (e) => console.warn("STT error:", e.error);
              recognition.current.start();
            } catch(e) { console.warn("STT 시작 실패:", e); }
          }
          
          setState("recording");
        } catch (e) {
          alert("🎤 마이크 권한이 필요합니다!\n브라우저 주소창 옆 🔒 아이콘을 눌러 마이크를 허용해주세요.");
        }
      };

      const stopRec = () => {
        if (mediaRecorder.current && mediaRecorder.current.state === "recording") {
          mediaRecorder.current.stop();
        }
        if (recognition.current) {
          try { recognition.current.stop(); } catch(e){}
        }
        setInterimText("");
        setState("done");
      };

      const reset = () => {
        if (audioUrl) URL.revokeObjectURL(audioUrl);
        setState("idle");
        setAudioUrl("");
        setTranscript("");
        finalTranscriptRef.current = "";
      };

      return { state, audioUrl, transcript, interimText, startRec, stopRec, reset };
    };

                <IStar s={48} fill={(hover || rating) >= n ? "#fbbf24" : "#e2e8f0"} c={rating === n ? "anim-star" : ""} />
              </button>
            ))}
          </div>
          {(hover || rating) > 0 && <p className="text-lg sm:text-xl font-black text-amber-600 font-jua">{messages[hover || rating]}</p>}
          {!submitted && (
            <button onClick={handleSubmit} disabled={rating === 0} className={`w-full py-3 sm:py-4 rounded-2xl text-xl sm:text-2xl font-black font-jua shadow-md ${rating === 0 ? "bg-slate-200 text-slate-400" : "bg-amber-500 text-white shadow-[0_5px_0_#b45309] active:translate-y-1 active:shadow-none"}`}>
              평가 제출하기 ✅
            </button>
          )}
          {submitted && rating < 4 && (
            <div className="w-full flex flex-col gap-2 anim-zoom">
              <p className="text-center text-base sm:text-lg font-bold text-orange-600 break-keep">💪 다시 도전해서 더 멋진 다짐을 해볼까요?</p>
              <div className="flex gap-2">
                <button onClick={onRetry} className="flex-1 py-3 sm:py-4 bg-orange-500 text-white rounded-2xl text-lg sm:text-xl font-black font-jua shadow-[0_5px_0_#c2410c] active:translate-y-1 active:shadow-none">↺ 다시 도전</button>
                <button onClick={() => onSubmit(rating)} className="flex-1 py-3 sm:py-4 bg-slate-400 text-white rounded-2xl text-lg sm:text-xl font-black font-jua shadow-[0_5px_0_#475569] active:translate-y-1 active:shadow-none">그냥 통과</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ===== 다짐 녹음 (음성+키보드 + 별점 평가) =====
    const AMissionRecord = ({ onDone, name }) => {
      const rec = useVoiceRecorder(name, "다짐");
      const [mode, setMode] = useState("voice");
      const [textInput, setTextInput] = useState("");
      const [showRating, setShowRating] = useState(false);
      const [retryCount, setRetryCount] = useState(0);
      const [submittedText, setSubmittedText] = useState(""); // 별점 평가에서 사용할 최종 텍스트
      
      useEffect(() => { speak("오늘 배운 것 중 실천할 것을 하나 표현해볼까요? 음성으로 말하거나 글자로 써도 좋아요!", 0.95); }, []);
      
      const onRetry = () => { 
        rec.reset();
        setTextInput("");
        setShowRating(false);
        setSubmittedText("");
        setRetryCount(c => c + 1);
        speak("다시 도전해봐요! 더 멋진 다짐을 만들어보자!");
      };
      
      const goToRating = (text, recordType) => {
        setSubmittedText(text);
        setShowRating(true);
      };
      
      const handleVoiceSubmit = () => {
        goToRating(rec.transcript || "(음성 인식 안 됨)", "voice");
      };
      
      const handleTextSubmit = () => {
        if (!textInput.trim()) { alert("내용을 입력해주세요!"); return; }
        goToRating(textInput.trim(), "text");
      };
      
      const onRatingSubmit = (rating) => {
        const recordType = mode === "voice" ? "🎤" : "⌨️";
        onDone({ 
          record: `다짐 작성 완료 ${recordType} (별점: ${'⭐'.repeat(rating)}, 재도전: ${retryCount}회)`, 
          transcript: submittedText,
          rating: rating
        });
      };
      
      return (
        <div className="flex flex-col items-center justify-center h-full gap-2 sm:gap-3 lg:gap-4 p-3 sm:p-4 lg:p-6 anim-zoom max-w-4xl mx-auto w-full min-h-0 overflow-y-auto">
          <div className="text-center shrink-0 w-full">
            <h2 className="text-xl sm:text-2xl lg:text-3xl font-black text-indigo-700 font-jua mb-1">🎤 나의 다짐 기록하기</h2>
            <p className="text-sm sm:text-base lg:text-xl font-bold text-slate-600 leading-snug break-keep">오늘 배운 것 중 <span className="text-indigo-500">실천할 것</span>을 표현해봐요!</p>
            {retryCount > 0 && <p className="text-xs sm:text-sm font-bold text-orange-500 mt-1">🔄 {retryCount}번째 도전!</p>}
          </div>
          
          {!showRating && (
            <>
              <div className="w-full max-w-2xl shrink-0">
                <InputModeToggle mode={mode} onChange={setMode} color="indigo" />
              </div>
              
              <div className="bg-indigo-50 border-[3px] border-indigo-200 rounded-[1.2rem] sm:rounded-[1.5rem] p-2 sm:p-3 text-xs sm:text-sm lg:text-base font-bold text-indigo-800 text-left w-full shadow-inner max-w-2xl mx-auto shrink-0">
                <p className="text-indigo-500 mb-1 text-xs sm:text-sm font-jua">💡 이렇게 표현해봐요!</p>
                <ul className="space-y-0.5 ml-2 break-keep">
                  <li>"나는 화가 나면 <span className="text-indigo-600">풍선 호흡</span>을 할 거예요!"</li>
                  <li>"친구가 아파하면 다가가서 <span className="text-indigo-600">위로</span>해 줄 거예요!"</li>
                </ul>
              </div>
              
              {mode === "voice" && (
                <>
                  <div className="relative w-20 h-20 sm:w-24 sm:h-24 lg:w-32 lg:h-32 bg-white rounded-full shadow-2xl border-[5px] sm:border-[6px] lg:border-[8px] border-indigo-100 flex items-center justify-center my-1 shrink-0 anim-zoom">
                    <div className={`text-[2.5rem] sm:text-[3rem] lg:text-[4.5rem] ${rec.state === "recording" ? "anim-pulse text-red-500" : "text-indigo-300"}`}>🎤</div>
                    {rec.state === "recording" && <div className="absolute inset-0 border-[5px] sm:border-[6px] lg:border-[8px] border-red-400 rounded-full anim-pulse"></div>}
                    {rec.state === "done" && <div className="absolute -bottom-2 sm:-bottom-3 left-1/2 -translate-x-1/2 text-xs sm:text-sm font-black text-white anim-bounce font-jua whitespace-nowrap bg-indigo-500 px-2 py-0.5 sm:px-3 sm:py-1 rounded-full shadow-lg">저장 완료! ✨</div>}
                  </div>
                  
                  {rec.state === "recording" && (rec.transcript || rec.interimText) && (
                    <div className="bg-white border-[3px] border-red-200 rounded-2xl p-2 w-full max-w-2xl shrink-0 max-h-16 sm:max-h-20 overflow-y-auto">
                      <p className="text-xs text-red-500 font-bold mb-0.5">🎙️ 듣는 중...</p>
                      <p className="text-sm font-bold text-slate-700">{rec.transcript}<span className="text-slate-400">{rec.interimText}</span></p>
                    </div>
                  )}
                  
                  {rec.state === "done" && rec.transcript && (
                    <div className="bg-indigo-50 border-[3px] border-indigo-300 rounded-2xl p-2 w-full max-w-2xl shrink-0 shadow-inner max-h-20 sm:max-h-24 overflow-y-auto">
                      <p className="text-xs text-indigo-600 font-bold mb-0.5">📝 내가 말한 다짐:</p>
                      <p className="text-sm font-bold text-slate-700 break-keep">{rec.transcript}</p>
                    </div>
                  )}
                  
                  {rec.state === "idle" && (
                    <div className="w-full max-w-2xl flex gap-2 mt-1 shrink-0">
                      <button onClick={rec.startRec} className="flex-1 py-3 sm:py-4 bg-indigo-500 text-white rounded-2xl text-base sm:text-xl lg:text-2xl font-black shadow-[0_5px_0_#3730a3] active:translate-y-1 active:shadow-none font-jua">🎙️ 녹음 시작</button>
                      <button onClick={() => onDone({ record: "다짐 건너뛰기 ⏩", transcript: "" })} className="px-4 sm:px-6 py-3 sm:py-4 bg-slate-300 text-slate-700 rounded-2xl text-sm sm:text-xl font-black shadow-[0_5px_0_#94a3b8] active:translate-y-1 active:shadow-none font-jua whitespace-nowrap">건너뛰기</button>
                    </div>
                  )}
                  {rec.state === "recording" && (
                    <button onClick={rec.stopRec} className="w-full max-w-2xl py-3 sm:py-4 bg-red-500 text-white rounded-2xl text-base sm:text-xl lg:text-2xl font-black shadow-[0_5px_0_#991b1b] anim-pulse font-jua mt-1 shrink-0">⏹️ 녹음 완료</button>
                  )}
                  {rec.state === "done" && (
                    <div className="w-full max-w-2xl flex flex-col gap-2 mt-1 shrink-0">
                      {rec.audioUrl && <audio src={rec.audioUrl} controls className="w-full h-9 sm:h-10 rounded-full border-[3px] border-indigo-100 bg-indigo-50 shadow-inner shrink-0" />}
                      <div className="flex gap-2 w-full mt-1 shrink-0">
                        <button onClick={rec.reset} className="flex-[0.4] py-2 sm:py-3 bg-orange-400 text-white rounded-2xl text-sm sm:text-lg font-black shadow-[0_4px_0_#ea580c] active:translate-y-1 active:shadow-none font-jua shrink-0">↺ 다시</button>
                        <button onClick={handleVoiceSubmit} className="flex-1 py-2 sm:py-3 bg-amber-500 text-white text-sm sm:text-lg lg:text-xl font-black rounded-2xl shadow-[0_4px_0_#b45309] active:translate-y-1 active:shadow-none font-jua shrink-0">⭐ 스티커 평가하기</button>
                      </div>
                    </div>
                  )}
                </>
              )}
              
              {mode === "text" && (
                <div className="w-full max-w-2xl flex flex-col gap-2 anim-zoom shrink-0">
                  <textarea 
                    value={textInput} 
                    onChange={e => setTextInput(e.target.value)} 
                    placeholder="실천할 다짐을 글자로 써봐요... ✏️"
                    className="w-full min-h-[80px] sm:min-h-[100px] lg:min-h-[120px] p-3 sm:p-4 bg-white border-[3px] sm:border-[4px] border-indigo-200 rounded-2xl text-sm sm:text-base lg:text-lg font-bold text-slate-700 focus:outline-none focus:border-indigo-400 resize-none shadow-inner"
                    maxLength={300}
                  />
                  <p className="text-xs sm:text-sm text-slate-400 text-right">{textInput.length}/300자</p>
                  <div className="flex gap-2 w-full">
                    <button onClick={() => onDone({ record: "다짐 건너뛰기 ⏩", transcript: "" })} className="px-4 sm:px-6 py-3 sm:py-4 bg-slate-300 text-slate-700 rounded-2xl text-sm sm:text-xl font-black shadow-[0_5px_0_#94a3b8] active:translate-y-1 active:shadow-none font-jua whitespace-nowrap">건너뛰기</button>
                    <button onClick={handleTextSubmit} className="flex-1 py-3 sm:py-4 bg-amber-500 text-white rounded-2xl text-base sm:text-xl lg:text-2xl font-black shadow-[0_5px_0_#b45309] active:translate-y-1 active:shadow-none font-jua">⭐ 스티커 평가하기</button>
                  </div>
                </div>
              )}
            </>
          )}
          
          {showRating && (
            <>
              {submittedText && (
                <div className="bg-slate-50 border-[3px] border-slate-200 rounded-2xl p-3 w-full max-w-2xl shrink-0 shadow-inner max-h-24 overflow-y-auto">
                  <p className="text-xs sm:text-sm text-slate-500 font-bold mb-1">📝 나의 다짐:</p>
                  <p className="text-sm sm:text-base font-bold text-slate-700 break-keep">{submittedText}</p>
                </div>
              )}
              <StarRating onSubmit={onRatingSubmit} onRetry={onRetry} />
            </>
          )}
        </div>
      );
    };

    // ===== 외트로 =====
    const Outro = ({ hearts, mission, onNext }) => {
      useEffect(() => { 
        speak(mission.feedFwd); 
        sfxStar();
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.7 } }); 
        const t = setTimeout(onNext, 3000); 
        return () => clearTimeout(t); 
      }, []);
      
      return (
        <div className="flex-1 flex items-center justify-center p-3 lg:p-6 anim-zoom w-full min-h-0">
          <div className="bg-yellow-50 p-4 sm:p-5 lg:p-6 rounded-[2rem] sm:rounded-[2.5rem] shadow-2xl border-[5px] sm:border-[6px] lg:border-[8px] border-yellow-300 w-full max-w-3xl flex flex-col items-center gap-2 sm:gap-3 lg:gap-5 min-h-0 max-h-full overflow-y-auto">
            <div className="text-[4rem] sm:text-[5rem] lg:text-[6rem] anim-bounce leading-none shrink-0">👏</div>
            <div className="flex gap-1 sm:gap-2 lg:gap-3 flex-wrap justify-center bg-white px-3 py-2 sm:px-5 sm:py-3 rounded-[1.5rem] sm:rounded-[2rem] border-4 border-yellow-100 shadow-sm w-full shrink-0">
              {Array.from({ length: 9 }).map((_, i) => (
                <IHeart key={i} s={28} fill={i < hearts ? "#ef4444" : "#e2e8f0"} c={i < hearts ? "text-red-400 anim-hb" : "text-slate-300"} />
              ))}
            </div>
            <h3 className="text-2xl sm:text-3xl lg:text-4xl font-black text-slate-800 font-jua shrink-0">하트 획득! 💖</h3>
            <div className="bg-white p-3 sm:p-4 lg:p-5 rounded-2xl border-4 border-yellow-200 w-full text-center relative shadow-md overflow-y-auto shrink-0 flex items-center min-h-[3rem] sm:min-h-[4rem]">
              <button onClick={() => speak(mission.feedFwd)} className="absolute top-1/2 -translate-y-1/2 right-2 sm:right-3 p-1.5 sm:p-2 bg-yellow-100 rounded-full text-yellow-600 hover:bg-yellow-200 active:scale-95"><IVol s={20} /></button>
              <p className="text-base sm:text-2xl lg:text-3xl font-bold text-slate-700 pr-10 sm:pr-12 break-keep leading-relaxed w-full min-h-0">{mission.feedFwd}</p>
            </div>
            <button onClick={onNext} className="w-full py-3 sm:py-4 lg:py-6 bg-yellow-400 text-white rounded-2xl text-lg sm:text-2xl lg:text-3xl font-black shadow-[0_4px_0_#ca8a04] active:translate-y-1 active:shadow-none font-jua mt-1 shrink-0 anim-pulse">다음으로 계속 ▶</button>
          </div>
        </div>
      );
    };

    // ===== 메인 앱 =====
    const App = () => {
      const [screen, setScreen] = useState("loading");
      const [actState, setActState] = useState("idle");
      const [mId, setMId] = useState(1);
      const [hearts, setHearts] = useState(0);
      const [name, setName] = useState("");
      const [records, setRecords] = useState({});
      const [ttsOn, setTtsOn] = useState(false); // 기본 꺼짐!
      const [showSidebar, setShowSidebar] = useState(false);
      const DEF_NAMES = ["홍길동", "김민수", "이영희", "박지민", "최우주", "정하늘"];
      const [names, setNames] = useState(DEF_NAMES);
      const [quizSets, setQuizSets] = useState(null);
      const mission = MISSIONS.find(m => m.id === mId);
      const TOTAL = MISSIONS.length;

      useEffect(() => {
        if (isGAS) {
          google.script.run.withSuccessHandler(r => setNames((r && r.length > 0) ? r : DEF_NAMES)).withFailureHandler(() => setNames(DEF_NAMES)).getNames();
          google.script.run.withSuccessHandler(r => setQuizSets(r || null)).withFailureHandler(() => setQuizSets(null)).getQuizData();
        } else {
          callGAS("getNames").then(r => setNames((r && r.length > 0) ? r : DEF_NAMES));
          callGAS("getQuizData").then(r => setQuizSets(r || null));
        }
        // 음성 미리 로드
        if (window.speechSynthesis) {
          window.speechSynthesis.getVoices();
          window.speechSynthesis.addEventListener?.('voiceschanged', () => { __cachedVoice = null; findBestKoreanVoice(); });
        }
        setTimeout(() => setScreen("name"), 1200);
      }, []);

      useEffect(() => { stopSpeak(); }, [mId]);

      const handleSelect = id => {
        sfxClick();
        setMId(id);
        setActState("intro_act");
        setShowSidebar(false);
        speak(MISSIONS.find(m => m.id === id)?.feedUp || "");
      };

      const complete = res => {
        const nH = Math.max(hearts, mId);
        setHearts(nH);
        const nr = { ...records, [mission.title]: res?.record || "완료" };
        setRecords(nr);
        setActState("outro");
        const rs = Object.entries(nr).map(([k, v]) => `[${k}] ${v}`).join(" | ");
        const pd = {
          날짜: new Date().toLocaleString("ko-KR"),
          이름: name || "이름없음",
          획득하트: nH,
          상세기록: rs,
          학습완료: mId === TOTAL ? "수료 완료 🎓" : `진행중 (미션 ${mId}/${TOTAL})`,
          미션종류: mission.title,
          음성텍스트: res?.transcript || "",
          별점: res?.rating || ""
        };
        if (isGAS) {
          google.script.run.saveRecord(pd);
        } else {
          callGAS("saveRecord", { data: pd });
        }
      };

      const goNext = () => {
        stopSpeak();
        if (mId < TOTAL) {
          const nextId = mId + 1;
          setMId(nextId);
          setActState("intro_act");
          speak(MISSIONS.find(m => m.id === nextId)?.feedUp || "");
        } else setScreen("certificate");
      };

      const toggleTTS = () => {
        const n = !ttsOn;
        window.__TTS__ = n;
        setTtsOn(n);
        if (n) {
          // 사용자 제스처 후 음성 활성화
          initAudio();
          speak("소리를 켰어요! 이제 모든 문제를 읽어줄게요!");
        } else {
          stopSpeak();
        }
      };

      const handleNameSelect = (n) => {
        setName(n);
        setScreen("dashboard");
        initAudio();
      };

      useEffect(() => {
        if (screen === "certificate") {
          speak("훌륭해! 마음 튼튼 새싹 학교를 멋지게 졸업했어! 대단해요!");
          sfxStar();
          const end = Date.now() + 5000;
          (function f() {
            confetti({ particleCount: 7, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#4ade80', '#fbbf24', '#f472b6'] });
            confetti({ particleCount: 7, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#4ade80', '#fbbf24', '#f472b6'] });
            if (Date.now() < end) requestAnimationFrame(f);
          }());
        }
      }, [screen]);

      useEffect(() => {
        if (screen === "dashboard" && actState === "idle") {
          if (mId === 1) speak("왼쪽에서 미션을 고르거나 잠시 기다리면 자동으로 시작할게!");
          const t = setTimeout(() => {
            setActState("intro_act");
            speak(MISSIONS.find(m => m.id === mId)?.feedUp || "");
          }, 3000);
          return () => clearTimeout(t);
        }
      }, [screen, actState, mId]);

      if (screen === "loading") return <Loading />;
      if (screen === "name") return <NameSelect names={names} onSelect={handleNameSelect} />;

      if (screen === "certificate") {
        const downloadReport = () => {
          const canvas = document.createElement('canvas');
          const W = 1200; const H = 1500;
          canvas.width = W; canvas.height = H;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = "#e0e7ff"; ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = "#ffffff";
          if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(50, 50, 1100, 1400, 40); ctx.fill(); } else { ctx.fillRect(50, 50, 1100, 1400); }
          ctx.lineWidth = 16; ctx.strokeStyle = "#fbbf24";
          if (ctx.roundRect) ctx.stroke();
          ctx.textAlign = "center"; ctx.fillStyle = "#312e81";
          ctx.font = "bold 90px 'Jua', sans-serif"; ctx.fillText("수 료 증", W / 2, 180);
          ctx.fillStyle = "#1e293b"; ctx.font = "bold 60px 'Jua', sans-serif"; ctx.fillText(`${name || "어린이"} 어린이`, W / 2, 300);
          ctx.fillStyle = "#f59e0b"; ctx.font = "bold 50px 'Jua', sans-serif"; ctx.fillText("🏅 마음 튼튼 새싹상", W / 2, 400);
          ctx.fillStyle = "#334155"; ctx.font = "bold 40px 'Jua', sans-serif";
          ctx.fillText("위 어린이는 스스로의 감정을 잘 이해하고,", W / 2, 510);
          ctx.fillText("친구를 따뜻하게 배려하는 훈련을 훌륭하게 완수하였기에", W / 2, 570);
          ctx.fillText("이 상장을 드립니다. 🌟", W / 2, 630);
          ctx.fillStyle = "#f8fafc";
          if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(100, 700, 1000, 580, 30); ctx.fill(); } else { ctx.fillRect(100, 700, 1000, 580); }
          ctx.fillStyle = "#4338ca"; ctx.font = "bold 45px 'Jua', sans-serif"; ctx.fillText("🌱 나의 배움 기록", W / 2, 770);
          ctx.textAlign = "left"; ctx.font = "bold 28px 'Jua', sans-serif";
          let y = 830;
          Object.entries(records).forEach(entry => {
            const k = entry[0]; const v = entry[1];
            ctx.fillStyle = "#6366f1"; ctx.fillText(`[${k}]`, 150, y);
            ctx.fillStyle = "#334155"; ctx.fillText((v || "").substring(0, 38), 450, y);
            y += 50;
          });
          ctx.textAlign = "center"; ctx.fillStyle = "#94a3b8"; ctx.font = "bold 35px 'Jua', sans-serif";
          ctx.fillText(`${new Date().toLocaleDateString("ko-KR")} 마음 튼튼 새싹 학교`, W / 2, 1380);
          const link = document.createElement('a');
          link.download = `마음튼튼상장_${name || "어린이"}.png`;
          link.href = canvas.toDataURL("image/png");
          link.click();
        };

        return (
          <div className="w-full h-full bg-gradient-to-b from-indigo-200 to-purple-300 flex p-3 sm:p-4 lg:p-6 overflow-hidden items-center justify-center relative">
            <button onClick={toggleTTS} className={`absolute top-3 sm:top-4 lg:top-6 left-3 sm:left-4 lg:left-6 flex items-center gap-2 px-3 py-2 sm:px-4 sm:py-2 lg:px-5 lg:py-2.5 rounded-2xl active:scale-95 shadow-md border-[3px] font-black font-jua text-base sm:text-xl lg:text-2xl transition-colors z-50 ${ttsOn ? "bg-white border-indigo-200 text-indigo-600" : "bg-slate-200 border-slate-300 text-slate-500"}`}>
              {ttsOn ? <><IVol s={24} /> 소리</> : <><IMute s={24} /> 소리</>}
            </button>
            <div className="bg-white p-4 sm:p-5 lg:p-8 rounded-[2rem] sm:rounded-[3rem] shadow-2xl border-[8px] sm:border-[10px] lg:border-[12px] border-yellow-400 w-full max-w-5xl flex flex-col items-center anim-zoom relative max-h-full overflow-hidden">
              <div className="absolute -top-3 -left-3 sm:-top-4 sm:-left-4 text-3xl sm:text-4xl lg:text-5xl anim-spin z-10">⭐</div>
              <div className="absolute -top-3 -right-3 sm:-top-4 sm:-right-4 text-3xl sm:text-4xl lg:text-5xl anim-spin z-10">⭐</div>
              <div className="text-[3rem] sm:text-[4rem] lg:text-[5rem] anim-float leading-none -mt-1 sm:-mt-2 shrink-0 relative z-20">🎓</div>
              <h2 className="text-2xl sm:text-3xl lg:text-4xl font-black text-indigo-900 font-jua border-b-[4px] sm:border-b-[6px] border-yellow-400 pb-1 sm:pb-2 px-6 sm:px-10 shrink-0">수 료 증</h2>
              <div className="text-center mt-2 sm:mt-3 shrink-0 flex items-center justify-center gap-2 flex-wrap">
                <span className="text-xl sm:text-2xl lg:text-3xl font-black text-slate-800 font-jua border-b-[3px] sm:border-b-[4px] border-green-400 pb-1 px-4 sm:px-6">{name || "어린이"}</span>
                <span className="text-base sm:text-xl lg:text-2xl font-bold text-slate-600">어린이</span>
              </div>
              <p className="text-base sm:text-xl lg:text-2xl font-black text-amber-500 font-jua mt-1 sm:mt-2 shrink-0 bg-amber-50 px-4 py-1 sm:px-6 sm:py-2 rounded-full border-[2px] sm:border-[3px] border-amber-200">🏅 마음 튼튼 새싹상</p>
              <div className="bg-slate-50 px-3 sm:px-5 lg:px-6 py-2 sm:py-3 lg:py-4 rounded-2xl sm:rounded-3xl border-[4px] sm:border-[6px] border-indigo-100 text-center w-full mt-2 sm:mt-3 shadow-sm shrink-0 flex flex-col items-center gap-1 sm:gap-2 lg:gap-3">
                <div className="text-sm sm:text-lg lg:text-xl font-black text-slate-800 break-keep leading-tight lg:leading-relaxed font-jua">
                  위 어린이는 스스로 마음을 공부하고 훈련하여
                  <div className="flex justify-center gap-1 sm:gap-1.5 lg:gap-2 my-1 sm:my-2 lg:my-3 flex-wrap">
                    {Array.from({ length: 9 }).map((_, i) => (<IHeart key={i} s={20} fill="#ef4444" c="text-red-400" />))}
                  </div>
                  <span className="text-green-600 text-lg sm:text-2xl lg:text-3xl">9개의 사랑의 하트</span>를 모두 모았기에<br />
                  이 상장을 아낌없이 칭찬하며 드립니다. 🌟
                </div>
              </div>
              <div className="w-full bg-indigo-50 rounded-2xl sm:rounded-3xl p-3 sm:p-4 lg:p-5 border-[4px] sm:border-[6px] border-indigo-100 mt-2 sm:mt-3 overflow-y-auto mb-2 min-h-0 flex-1 shadow-inner">
                <h3 className="text-base sm:text-xl lg:text-2xl font-black text-indigo-800 text-center mb-2 sm:mb-3 font-jua">🌱 나의 마음 공부 기록</h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 sm:gap-3">
                  {Object.entries(records).length > 0 ? Object.entries(records).map((entry, i) => {
                    const missionName = entry[0]; const recordText = entry[1];
                    return (
                      <div key={i} className="flex flex-col bg-white p-2 sm:p-3 lg:p-4 rounded-xl sm:rounded-2xl border-[2px] sm:border-[3px] border-indigo-50 min-w-0 shadow-sm">
                        <span className="text-indigo-600 font-black text-sm sm:text-base lg:text-lg mb-0.5 sm:mb-1 truncate font-jua">{missionName}</span>
                        <span className="text-slate-700 font-bold text-xs sm:text-sm lg:text-base break-keep">{recordText}</span>
                      </div>
                    );
                  }) : (
                    <div className="col-span-2 text-center text-slate-400 font-bold py-4 text-base sm:text-xl">배움 기록이 없습니다.</div>
                  )}
                </div>
              </div>
              <p className="text-xs sm:text-sm lg:text-base font-bold text-slate-400 shrink-0 mb-2">{new Date().toLocaleDateString("ko-KR")} 마음 튼튼 새싹 학교 🏫</p>
              <div className="flex gap-2 sm:gap-3 lg:gap-5 w-full shrink-0">
                <button onClick={() => { setScreen("name"); setActState("idle"); setMId(1); setHearts(0); setRecords({}); }} className="flex-[0.4] py-3 sm:py-4 lg:py-5 bg-slate-200 text-slate-700 rounded-[1.5rem] sm:rounded-[2rem] text-base sm:text-xl lg:text-2xl font-black active:scale-95 shadow-md border-b-[5px] sm:border-b-[6px] border-slate-300 active:border-b-0 active:translate-y-1 font-jua">처음으로 🏠</button>
                <button onClick={downloadReport} className="flex-1 py-3 sm:py-4 lg:py-5 bg-indigo-500 text-white rounded-[1.5rem] sm:rounded-[2rem] text-lg sm:text-2xl lg:text-3xl font-black active:scale-95 shadow-[0_6px_0_#3730a3] sm:shadow-[0_8px_0_#3730a3] border-indigo-600 active:border-b-0 active:translate-y-2 font-jua anim-bounce text-center">🏆 수료증 받기</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="w-full h-full flex bg-slate-50 relative">
          {/* 데스크톱 사이드바 */}
          <div className="hidden md:block">
            <Sidebar hearts={hearts} mId={mId} records={records} onSelect={handleSelect} totalMissions={TOTAL} />
          </div>
          {/* 모바일 사이드바 (오버레이) */}
          {showSidebar && (
            <div className="md:hidden fixed inset-0 z-40 flex">
              <Sidebar hearts={hearts} mId={mId} records={records} onSelect={handleSelect} onClose={() => setShowSidebar(false)} totalMissions={TOTAL} />
              <div className="flex-1 bg-black/50" onClick={() => setShowSidebar(false)}></div>
            </div>
          )}
          
          <div className="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
            <div className="flex justify-between items-center p-3 sm:p-4 lg:p-5 shrink-0 bg-white border-b-4 border-slate-100 shadow-sm z-20 gap-2">
              <div className="flex items-center gap-2">
                <button onClick={() => setShowSidebar(true)} className="md:hidden p-2 bg-slate-100 rounded-xl active:scale-95 text-slate-600 shrink-0">
                  <IMenu s={24} />
                </button>
                <button onClick={toggleTTS} className={`flex items-center gap-1.5 sm:gap-2 px-3 py-2 sm:px-4 sm:py-2 lg:px-5 lg:py-2.5 rounded-xl sm:rounded-2xl active:scale-95 shadow-inner border-[2px] sm:border-[3px] font-black font-jua text-base sm:text-xl lg:text-2xl transition-colors ${ttsOn ? "bg-indigo-50 border-indigo-200 text-indigo-600" : "bg-slate-100 border-slate-200 text-slate-400"}`}>
                  {ttsOn ? <><IVol s={22} /> <span className="hidden sm:inline">소리 켜짐</span></> : <><IMute s={22} /> <span className="hidden sm:inline">소리 꺼짐</span></>}
                </button>
              </div>
              <div className="flex gap-2 sm:gap-3 lg:gap-4 shrink-0">
                <span className="hidden sm:flex text-base sm:text-xl lg:text-2xl font-black text-slate-600 font-jua bg-slate-100 rounded-[1rem] sm:rounded-[1.5rem] px-3 sm:px-4 lg:px-6 py-1.5 sm:py-2 border-[2px] sm:border-[3px] border-slate-200 shadow-inner items-center min-w-0 whitespace-nowrap">{name || "홍길동"}</span>
                <div className="flex items-center gap-1.5 sm:gap-2 bg-red-50 border-[2px] sm:border-[3px] border-red-200 px-3 sm:px-4 lg:px-6 py-1.5 sm:py-2 rounded-[1rem] sm:rounded-[1.5rem] shadow-inner shrink-0 whitespace-nowrap">
                  <IHeart s={22} fill="#ef4444" c="anim-hb text-red-500" />
                  <span className="text-xl sm:text-2xl lg:text-3xl font-black text-red-500 font-jua mt-0.5 sm:mt-1">{hearts}/{TOTAL}</span>
                </div>
              </div>
            </div>
            
            <div className="flex-1 min-h-0 relative flex flex-col">
              {actState === "idle" && (
                <div className="flex-1 flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8 gap-3 sm:gap-4 lg:gap-6 anim-fade min-h-0">
                  <div className="text-[5rem] sm:text-[7rem] lg:text-[9rem] anim-float shrink-0">🗺️</div>
                  <div className="text-center shrink-0">
                    <h2 className="text-2xl sm:text-4xl lg:text-5xl font-black text-slate-700 font-jua mb-1 sm:mb-2 lg:mb-4">미션을 골라봐!</h2>
                    <p className="text-slate-400 font-bold text-base sm:text-xl lg:text-2xl break-keep">{TOTAL}개의 미션을 모두 완료하면 수료증을 받을 수 있어!</p>
                  </div>
                  <div className="flex gap-2 sm:gap-3 lg:gap-4 flex-wrap justify-center mt-1 sm:mt-2 lg:mt-4 shrink-0 overflow-y-auto min-h-0 px-2">
                    {[1, 2, 3, 4].map(n => {
                      const ms = MISSIONS.filter(m => m.chap === n);
                      if (ms.length === 0) return null;
                      return (
                        <div key={n} className={`bg-gradient-to-r ${CS[CC[n - 1]].hdr} text-white px-3 py-2 sm:px-5 sm:py-3 lg:px-6 lg:py-4 rounded-[1rem] sm:rounded-[1.5rem] lg:rounded-[2rem] text-base sm:text-xl lg:text-2xl font-black font-jua shadow-md`}>{ms[0].chapName}</div>
                      );
                    })}
                  </div>
                  <p className="text-base sm:text-xl lg:text-2xl font-bold text-blue-500 bg-blue-50 px-4 py-2 sm:px-6 sm:py-3 rounded-full anim-pulse mt-1 sm:mt-2 lg:mt-4 shrink-0">⏳ 잠시 후 자동으로 시작됩니다...</p>
                </div>
              )}
              
              {actState === "intro_act" && mission && (
                <div className="flex-1 flex items-center justify-center p-4 sm:p-6 lg:p-8 anim-zoom min-h-0">
                  <div className="bg-white p-5 sm:p-8 lg:p-10 rounded-[2rem] sm:rounded-[2.5rem] lg:rounded-[3rem] shadow-2xl border-[6px] sm:border-[8px] border-emerald-300 w-full max-w-2xl flex flex-col items-center gap-3 sm:gap-4 lg:gap-6 max-h-full overflow-y-auto">
                    <span className="text-emerald-500 font-black text-lg sm:text-2xl lg:text-3xl font-jua shrink-0">{mission.chapName}</span>
                    <div className="text-[4rem] sm:text-[6rem] lg:text-[7.5rem] anim-float leading-none shrink-0">{mission.icon}</div>
                    <h2 className="text-2xl sm:text-4xl lg:text-5xl font-black text-slate-800 font-jua text-center shrink-0">{mission.title}</h2>
                    <div className="bg-emerald-50 p-4 sm:p-6 lg:p-8 rounded-[1.5rem] sm:rounded-[2rem] border-4 border-emerald-100 w-full text-center relative shrink-0">
                      <button onClick={() => speak(mission.feedUp)} className="absolute top-3 right-3 sm:top-4 sm:right-4 p-2 sm:p-3 bg-emerald-200 rounded-full text-emerald-700"><IVol s={24} /></button>
                      <p className="text-lg sm:text-2xl lg:text-3xl font-bold text-emerald-900 pr-10 break-keep leading-relaxed">{mission.feedUp}</p>
                    </div>
                    <button onClick={() => { stopSpeak(); sfxClick(); setActState("play"); }} className="w-full py-4 sm:py-6 lg:py-8 bg-emerald-500 text-white rounded-[1.5rem] sm:rounded-[2rem] text-2xl sm:text-3xl lg:text-4xl font-black shadow-[0_6px_0_#047857] sm:shadow-[0_8px_0_#047857] active:translate-y-2 active:shadow-none font-jua mt-1 sm:mt-2 shrink-0">시작하기 ▶</button>
                  </div>
                </div>
              )}
              
              {actState === "play" && mission && (
                <div className="flex-1 flex flex-col overflow-hidden">
                  <div className="px-4 sm:px-6 py-3 sm:py-4 flex items-center gap-2 sm:gap-4 border-b-4 border-slate-100 bg-white shrink-0">
                    <button onClick={() => setActState("idle")} className="p-2 sm:p-3 text-slate-400 hover:bg-slate-100 rounded-full active:scale-95"><IBack s={24} /></button>
                    <span className="text-lg sm:text-2xl lg:text-3xl font-black text-slate-600 font-jua truncate">{mission.chapName} · {mission.title}</span>
                  </div>
                  <div className="flex-1 overflow-hidden relative max-w-5xl mx-auto w-full">
                    {mission.type === "startVoice" && <AStartVoice onDone={complete} name={name} />}
                    {mission.type === "weather" && <AWeather onDone={complete} />}
                    {mission.type === "quiz" && <AQuiz setKey={mission.set} onDone={complete} quizSets={quizSets} />}
                    {mission.type === "breath" && <ABreath onDone={complete} />}
                    {mission.type === "scrub" && <AScrub onDone={complete} />}
                    {mission.type === "bandage" && <ABandage onDone={complete} />}
                    {mission.type === "teach" && <ATeach onDone={complete} name={name} />}
                    {mission.type === "record" && <AMissionRecord onDone={complete} name={name} />}
                  </div>
                </div>
              )}
              
              {actState === "outro" && mission && <Outro hearts={hearts} mission={mission} onNext={goNext} />}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

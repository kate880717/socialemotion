    * {

      -webkit-tap-highlight-color: transparent

    html,
    body,
    #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden
    }

    body {
      font-family: "Noto Sans KR", sans-serif;
      background: #f0fdf4;
      touch-action: manipulation
    }

    .font-jua {
      font-family: "Jua", sans-serif
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: scale(.7)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .anim-zoom {
      animation: zoomIn .35s cubic-bezier(.175, .885, .32, 1.275) both
    }

    @keyframes floatY {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-12px)
      }
    }

    .anim-float {
      animation: floatY 2.5s ease-in-out infinite
    }

    @keyframes hb {

      0%,
      100% {
        transform: scale(1)
      }

      30% {
        transform: scale(1.45)
      }

      60% {
        transform: scale(1)
      }
    }

    .anim-hb {
      animation: hb 1.4s ease-in-out infinite
    }

    @keyframes pulse2 {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .35
      }
    }

    .anim-pulse {
      animation: pulse2 1.5s ease-in-out infinite
    }

    @keyframes bounceBtn {

      0%,
      100% {

      }

      50% {
        transform: translateY(-7px)
      }
    }

    .anim-bounce {

    }

    @keyframes spin360 {

      }

      to {

      }
    }

</head>

              {actState === "idle" && (<div className="flex-1 flex flex-col items-center justify-center p-6 lg:p-8 gap-4 lg:gap-6 anim-fade min-h-0"><div className="text-[7rem] lg:text-[9rem] anim-float shrink-0">🗺️</div><div className="text-center shrink-0"><h2 className="text-4xl lg:text-5xl font-black text-slate-700 font-jua mb-2 lg:mb-4">왼쪽에서 미션을 골라봐!</h2><p className="text-slate-400 font-bold text-xl lg:text-2xl">8개의 미션을 모두 완료하면 수료증을 받을 수 있어!</p></div><div className="flex gap-3 lg:gap-4 flex-wrap justify-center mt-2 lg:mt-4 shrink-0 overflow-y-auto min-h-0">{[1, 2, 3, 4].map(n => (<div key={n} className={`bg-gradient-to-r ${CS[CC[n - 1]].hdr} text-white px-5 py-3 lg:px-6 lg:py-4 rounded-[1.5rem] lg:rounded-[2rem] text-xl lg:text-2xl font-black font-jua shadow-md`}>{MISSIONS.filter(m => m.chap === n)[0].chapName}</div>))}</div><p className="text-xl lg:text-2xl font-bold text-blue-500 bg-blue-50 px-6 py-3 rounded-full anim-pulse mt-2 lg:mt-4 shrink-0">⏳ 잠시 후 자동으로 시작됩니다...</p></div>)}
              {actState === "intro_act" && mission && (<div className="flex-1 flex items-center justify-center p-6 lg:p-8 anim-zoom min-h-0"><div className="bg-white p-8 lg:p-10 rounded-[2.5rem] lg:rounded-[3rem] shadow-2xl border-[8px] border-emerald-300 w-full max-w-2xl flex flex-col items-center gap-4 lg:gap-6 max-h-full overflow-y-auto"><span className="text-emerald-500 font-black text-2xl lg:text-3xl font-jua shrink-0">{mission.chapName}</span><div className="text-[6rem] lg:text-[7.5rem] anim-float leading-none shrink-0">{mission.icon}</div><h2 className="text-4xl lg:text-5xl font-black text-slate-800 font-jua text-center shrink-0">{mission.title}</h2><div className="bg-emerald-50 p-6 lg:p-8 rounded-[2rem] border-4 border-emerald-100 w-full text-center relative shrink-0"><button onClick={() => speak(mission.feedUp)} className="absolute top-4 right-4 p-3 bg-emerald-200 rounded-full text-emerald-700"><IVol s={28} /></button><p className="text-2xl lg:text-3xl font-bold text-emerald-900 pr-10 break-keep leading-relaxed">{mission.feedUp}</p></div><button onClick={() => { stopSpeak(); setActState("play"); }} className="w-full py-6 lg:py-8 bg-emerald-500 text-white rounded-[2rem] text-3xl lg:text-4xl font-black shadow-[0_8px_0_#047857] active:translate-y-2 active:shadow-none font-jua mt-2 shrink-0">시작하기 ▶</button></div></div>)}
              {actState === "play" && mission && (<div className="flex-1 flex flex-col overflow-hidden"><div className="px-6 py-4 flex items-center gap-4 border-b-4 border-slate-100 bg-white shrink-0"><button onClick={() => setActState("idle")} className="p-3 text-slate-400 hover:bg-slate-100 rounded-full active:scale-95"><IBack s={32} /></button><span className="text-3xl font-black text-slate-600 font-jua">{mission.chapName} · {mission.title}</span></div><div className="flex-1 overflow-hidden relative max-w-5xl mx-auto w-full">{mission.type === "weather" && <AWeather onDone={complete} />}{mission.type === "quiz" && <AQuiz setKey={mission.set} onDone={complete} quizSets={quizSets} />}{mission.type === "breath" && <ABreath onDone={complete} />}{mission.type === "scrub" && <AScrub onDone={complete} />}{mission.type === "bandage" && <ABandage onDone={complete} />}{mission.type === "record" && <AMissionRecord onDone={complete} name={name} />}{mission.type === "finish" && (<div className="flex flex-col items-center justify-center h-full anim-zoom gap-8 p-8"><div className="text-[12rem] anim-float">🎓</div><p className="text-5xl font-black text-slate-800 font-jua text-center break-keep leading-loose">{mission.feedUp}</p><button onClick={() => complete({ record: "과정 수료 완료 🎓" })} className="w-full max-w-lg py-10 bg-yellow-400 text-white rounded-[3rem] text-5xl font-black shadow-[0_12px_0_#ca8a04] active:translate-y-2 active:shadow-none font-jua mt-6 anim-bounce">수료하기 🎓</button></div>)}</div></div>)}
              {actState === "outro" && mission && <Outro hearts={hearts} mission={mission} onNext={goNext} />}
            </div>
          </div>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
